; Firmware hidroponía — ESP32-WROOM-32 (DevKit)
; Compilar/flashear:  pio run -t upload    Monitor serie:  pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
